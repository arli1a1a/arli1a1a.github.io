<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园安全 · 系统时间实时灯</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #f4f9fd;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.8rem 1rem;
        }
        .container {
            max-width: 1300px;
            width: 100%;
        }

        /* 网格：每行两个div */
        .campus-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.2rem;
        }

        /* 每个卡片：只有地名 + 一个大灯 */
        .location-card {
            background: white;
            border-radius: 40px;
            padding: 1.2rem 1.8rem;
            box-shadow: 0 6px 14px rgba(0, 42, 64, 0.08);
            border: 1px solid #d9e9f2;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: 0.15s;
        }
        .location-card:hover {
            border-color: #aecfeb;
            box-shadow: 0 12px 22px -8px rgba(4, 67, 102, 0.18);
            background: #fbfeff;
        }

        .location-name {
            font-weight: 650;
            font-size: 1.35rem;
            color: #0b3f5c;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .location-name::before {
            content: "📍";
            font-size: 1.2rem;
            opacity: 0.9;
        }

        /* 主指示灯 —— 大号 */
        .main-led {
            width: 60px;
            height: 60px;
            border-radius: 60px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: background 0.2s, border-color 0.2s;
            border: 2px solid rgba(255,255,255,0.5);
            background: #cbdae6; /* fallback gray */
        }
        .main-led.gray { background: #9db1c2; border-color: #6f8ca3; }
        .main-led.red { background: #e54848; border-color: #b3403a; }
        .main-led.yellow { background: #f5b342; border-color: #c47d24; }
        .main-led.green { background: #2b9b4b; border-color: #1f7540; }

        @media (max-width: 700px) {
            .campus-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- 网格容器：每行两个div，只有地名和指示灯 (完全无顶栏/底栏) -->
    <div class="campus-grid" id="campusGrid"></div>
</div>

<script>
    (function() {
        // ---------- 数据定义：每个地点的六个时段评分（完全取自excel周一1~周一6）--------
        const locationData = [
            { name: "1号教学楼", scores: [0,0,0,0,0,0] },
            { name: "2号教学楼", scores: [3,2,2,2,3,3] },
            { name: "3号教学楼", scores: [3,3,3,3,3,3] },
            { name: "4号教学楼", scores: [1,1,1,1,1,1] },
            { name: "5号教学楼", scores: [3,2,2,2,3,3] },
            { name: "6号教学楼", scores: [3,2,2,2,3,3] },
            { name: "食堂", scores: [0,2,2,2,3,3] },
            { name: "3号公寓", scores: [1,1,1,1,2,1] },
            { name: "4号公寓", scores: [3,3,3,3,3,3] },
            { name: "5号公寓", scores: [0,0,0,0,0,0] },
            { name: "6号公寓", scores: [0,0,0,0,0,0] },
            { name: "7号公寓", scores: [3,3,3,3,3,3] },
            { name: "8号公寓", scores: [0,0,0,0,0,0] },
            { name: "9号公寓", scores: [0,0,0,0,0,0] },
            { name: "行政楼", scores: [0,3,3,3,3,0] },
            { name: "综合实训基地", scores: [0,2,2,2,3,3] },
            { name: "实训楼", scores: [0,2,2,2,2,0] },
            { name: "红石榴大厦", scores: [3,3,3,3,3,3] },
            { name: "运动场", scores: [2,2,2,2,3,3] },
            { name: "体育馆", scores: [2,2,2,2,3,3] },
            { name: "图书馆", scores: [3,3,3,3,3,3] },
            { name: "校外", scores: [3,2,2,2,3,3] }
        ];

        // 根据评分返回对应的css颜色类
        function getColorClass(score) {
            if (score === 0) return 'gray';
            if (score === 1) return 'red';
            if (score === 2) return 'yellow';
            if (score === 3) return 'green';
            return 'gray';
        }

        // ***** 核心：根据当前系统时间判断时段索引 (0~5) *****
        function getCurrentSlotIndex() {
            const now = new Date();
            const hours = now.getHours();
            const minutes = now.getMinutes();
            const totalMinutes = hours * 60 + minutes;

            // 时段定义：
            // 0: 00:00–07:40  (0 * 60 ～ 7*60+40 = 460)
            // 1: 07:40–11:40  (460 ～ 11*60+40 = 700)
            // 2: 11:40–13:20  (700 ～ 13*60+20 = 800)
            // 3: 13:20–18:30  (800 ～ 18*60+30 = 1110)
            // 4: 18:30–20:30  (1110 ～ 20*60+30 = 1230)
            // 5: 20:30–23:59  (1230 ～ 24*60-1 = 1439)

            if (totalMinutes < 460) return 0;            // 00:00 ~ 07:40
            if (totalMinutes < 700) return 1;            // 07:40 ~ 11:40
            if (totalMinutes < 800) return 2;            // 11:40 ~ 13:20
            if (totalMinutes < 1110) return 3;           // 13:20 ~ 18:30
            if (totalMinutes < 1230) return 4;           // 18:30 ~ 20:30
            return 5;                                     // 20:30 ~ 23:59
        }

        const grid = document.getElementById('campusGrid');

        // 存储所有卡片的大灯元素和对应的分数数组，方便更新
        const cardItems = [];

        // 构建卡片
        locationData.forEach(loc => {
            const card = document.createElement('div');
            card.className = 'location-card';

            // 地名
            const nameSpan = document.createElement('span');
            nameSpan.className = 'location-name';
            nameSpan.textContent = loc.name;
            card.appendChild(nameSpan);

            // 大灯
            const ledDiv = document.createElement('div');
            ledDiv.className = 'main-led gray';  // 临时，马上刷新
            card.appendChild(ledDiv);

            grid.appendChild(card);

            // 保存引用
            cardItems.push({
                led: ledDiv,
                scores: loc.scores
            });
        });

        // 更新所有灯的颜色 (根据当前系统时段)
        function updateLedsFromSystemTime() {
            const slotIndex = getCurrentSlotIndex();
            cardItems.forEach(item => {
                const score = item.scores[slotIndex];
                // 移除现有颜色类
                item.led.classList.remove('gray', 'red', 'yellow', 'green');
                // 添加新类
                const colorClass = getColorClass(score);
                item.led.classList.add(colorClass);
            });
        }

        // 初始更新
        updateLedsFromSystemTime();

        // 可选：每分钟自动刷新一次，使灯随系统时间变化 (比如跨时段时自动变色)
        setInterval(updateLedsFromSystemTime, 60000); // 每分钟检查一次（足够平滑，且轻量）

        // 如果想立刻看到变化也可以监听时间变化，但setInterval足够了。
    })();
</script>

</body>
</html>
